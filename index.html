<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Dunsfold Renovation &amp; Move</title>
<meta name="description" content="Shared renovation and move tracker for Dunsfold Residences 3C" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1A2B4A" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Dunsfold" />
<style>
  :root {
    --navy: #1A2B4A; --navy2: #2C3E5F; --gold: #B8872C; --paper: #FAF9F6;
    --slate: #4A5568; --line: #ECE8DD; --line2: #D6D1C4; --muted: #8A8578;
    --green: #22543D; --red: #9B1C1C;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--navy);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mast {
    background: var(--navy); border-bottom: 3px solid var(--gold);
    padding: calc(24px + env(safe-area-inset-top)) 20px 22px;
  }
  .wrap { max-width: 860px; margin: 0 auto; }
  .eyebrow {
    color: var(--gold); font-size: 11px; letter-spacing: .18em;
    font-weight: 700; text-transform: uppercase; margin-bottom: 6px;
  }
  h1 { font-family: Georgia, 'Times New Roman', serif; color: #fff; font-size: 26px; margin: 0; }
  .stats { display: flex; gap: 26px; margin-top: 16px; flex-wrap: wrap; align-items: flex-end; }
  .counter .big { font-family: Georgia, serif; font-size: 32px; font-weight: 700; color: #fff; line-height: 1; }
  .counter.gold .big { color: var(--gold); }
  .counter .lbl { font-size: 10.5px; color: #C7CEDB; letter-spacing: .04em; margin-top: 3px; text-transform: uppercase; }
  .progwrap { flex: 1; min-width: 180px; }
  .progmeta { display: flex; justify-content: space-between; color: #C7CEDB; font-size: 12px; margin-bottom: 5px; }
  .progbar { height: 6px; background: var(--navy2); border-radius: 3px; overflow: hidden; }
  .progbar > div { height: 100%; background: var(--gold); transition: width .4s ease; }
  .editdates {
    align-self: flex-start; border: 1px solid var(--gold); background: transparent;
    color: var(--gold); border-radius: 6px; padding: 5px 11px; font-size: 12px;
    font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .dateeditor { display: none; gap: 14px; margin-top: 14px; align-items: flex-end; flex-wrap: wrap; }
  .dateeditor label {
    color: #C7CEDB; font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
    display: flex; flex-direction: column; gap: 4px; font-weight: 700;
  }
  .dateeditor input {
    padding: 7px 9px; border-radius: 6px; border: 1px solid var(--line2);
    font-size: 14px; font-family: inherit; color: var(--navy);
  }
  .dateeditor button {
    padding: 9px 18px; border: none; border-radius: 6px; background: var(--gold);
    color: #fff; font-weight: 700; cursor: pointer; font-size: 13px;
  }
  .toolbar {
    max-width: 860px; margin: 0 auto; padding: 14px 20px 0;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .chip {
    padding: 6px 14px; border-radius: 999px; border: 1px solid var(--line2);
    background: #fff; color: var(--slate); font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .chip.on { background: var(--navy); border-color: var(--navy); color: #fff; }
  .toolbtn {
    padding: 6px 12px; border-radius: 6px; border: 1px solid var(--line2);
    background: #fff; color: var(--slate); font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .savenote { margin-left: auto; font-size: 12px; color: var(--muted); }
  main { max-width: 860px; margin: 0 auto; padding: 10px 20px 70px; }
  section { margin-top: 26px; }
  .phead {
    display: flex; align-items: baseline; gap: 11px;
    border-bottom: 2px solid var(--navy); padding-bottom: 8px;
  }
  .pnum { font-family: Georgia, serif; font-size: 13px; color: var(--gold); font-weight: 700; }
  .phead h2 { font-family: Georgia, serif; font-size: 19px; margin: 0; }
  .pdates { font-size: 12px; color: var(--muted); }
  .pcount { margin-left: auto; font-size: 12px; color: var(--muted); font-weight: 600; }
  .pcount.full { color: var(--green); }
  ul.tasks { list-style: none; margin: 0; padding: 0; }
  li.task {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 11px 2px; border-bottom: 1px solid var(--line);
  }
  li.task.done { opacity: .55; }
  li.task.done .txt { text-decoration: line-through; }
  .cb {
    width: 22px; height: 22px; margin-top: 1px; border-radius: 5px; flex-shrink: 0;
    border: 2px solid var(--gold); background: #fff; color: #fff;
    font-size: 13px; line-height: 18px; cursor: pointer; padding: 0;
  }
  li.task.done .cb { border-color: var(--green); background: var(--green); }
  .txtwrap { flex: 1; cursor: pointer; min-width: 0; }
  .txt { font-size: 14.5px; line-height: 1.45; }
  .meta { font-size: 11.5px; color: var(--gold); margin-top: 2px; font-weight: 600; }
  .who {
    font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: 999px;
    border: none; cursor: pointer; flex-shrink: 0;
  }
  .who.CK { background: var(--navy); color: #fff; }
  .who.Sophia { background: var(--gold); color: #fff; }
  .who.Both { background: #E8E2D6; color: var(--navy); }
  .del {
    border: none; background: transparent; color: #B9B3A4; cursor: pointer;
    font-size: 17px; line-height: 1; padding: 2px 4px; flex-shrink: 0;
  }
  .addrow { display: flex; gap: 8px; margin-top: 10px; }
  .addrow input {
    flex: 1; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--line2);
    font-size: 14px; background: #fff; color: var(--navy); outline: none;
  }
  .addrow input:focus { border-color: var(--gold); }
  .addrow button {
    padding: 10px 16px; border-radius: 6px; border: none; background: var(--gold);
    color: #fff; font-weight: 700; font-size: 13px; cursor: pointer;
  }
  .empty { padding: 12px 2px; font-size: 13px; color: var(--muted); font-style: italic; }
  .foot {
    margin-top: 38px; font-size: 12px; color: var(--muted); line-height: 1.6;
    border-top: 1px solid var(--line); padding-top: 14px;
  }
  /* ── Detail view ─────────────────────────────── */
  .back {
    display: inline-flex; align-items: center; gap: 8px; margin-top: 12px;
    border: none; background: var(--gold); color: #fff; font-weight: 700;
    font-size: 15px; cursor: pointer; padding: 12px 22px; border-radius: 8px;
    box-shadow: 0 1px 3px rgba(26,43,74,.3); letter-spacing: .02em;
  }
  .back:active { transform: translateY(1px); }
  .seg { display: inline-flex; border: 1.5px solid var(--line2); border-radius: 8px; overflow: hidden; background: #fff; }
  .seg button {
    border: none; background: #fff; color: var(--slate); font-size: 13px; font-weight: 600;
    padding: 9px 15px; cursor: pointer; border-right: 1.5px solid var(--line2);
  }
  .seg button:last-child { border-right: none; }
  .seg button.on.s-open { background: var(--navy); color: #fff; }
  .seg button.on.s-done { background: var(--green); color: #fff; }
  .seg button.on.s-na { background: var(--muted); color: #fff; }
  .mv { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
  .mv button {
    border: 1px solid var(--line2); background: #fff; color: var(--slate); cursor: pointer;
    font-size: 10px; line-height: 1; padding: 4px 6px; border-radius: 4px;
  }
  .mv button:disabled { opacity: .25; cursor: default; }
  .pri {
    font-family: Georgia, serif; font-weight: 700; font-size: 13px;
    color: var(--muted); min-width: 20px; text-align: right;
    margin-top: 4px; flex-shrink: 0;
  }
  li.task.late .txt { color: #E11D1D; font-style: italic; }
  li.task.late .pri { color: #E11D1D; }
  li.task.na { opacity: .45; }
  li.task.na .txt { font-style: italic; }
  li.task.na .cb { border-color: var(--muted); background: var(--muted); color: #fff; }
  .d-eyebrow { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); font-weight: 700; margin-top: 10px; }
  .d-title {
    width: 100%; font-family: Georgia, serif; font-size: 21px; font-weight: 700;
    color: var(--navy); border: none; border-bottom: 2px solid var(--line2);
    background: transparent; padding: 8px 0; outline: none; margin-top: 4px;
  }
  .d-title:focus { border-bottom-color: var(--gold); }
  .d-status { display: flex; align-items: center; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
  .d-status .cb { width: 24px; height: 24px; line-height: 20px; }
  .d-status .statlbl { font-size: 13.5px; color: var(--slate); }
  .d-sec { margin-top: 26px; }
  .d-sec h3 {
    font-family: Georgia, serif; font-size: 15px; margin: 0 0 4px;
    border-bottom: 2px solid var(--navy); padding-bottom: 6px;
  }
  .d-sec .hint { font-size: 12px; color: var(--muted); margin: 6px 0 10px; }
  .d-notes {
    width: 100%; min-height: 92px; padding: 10px 12px; border-radius: 6px;
    border: 1px solid var(--line2); font-size: 14px; font-family: inherit;
    color: var(--navy); background: #fff; outline: none; resize: vertical; line-height: 1.5;
  }
  .d-notes:focus { border-color: var(--gold); }
  .entry {
    display: flex; gap: 8px; align-items: flex-start; padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .entry .pick {
    border: none; background: transparent; cursor: pointer; font-size: 19px;
    color: #D6D1C4; padding: 6px 2px 0; flex-shrink: 0; line-height: 1;
  }
  .entry .pick.on { color: var(--gold); }
  .entry .fields { flex: 1; min-width: 0; }
  .entry input, .entry textarea {
    width: 100%; border: 1px solid transparent; background: transparent;
    font-family: inherit; color: var(--navy); outline: none; border-radius: 5px; padding: 5px 7px;
  }
  .entry input { font-size: 14.5px; font-weight: 700; }
  .entry textarea { font-size: 13.5px; color: var(--slate); resize: vertical; min-height: 34px; line-height: 1.45; margin-top: 1px; }
  .entry input:focus, .entry textarea:focus { border-color: var(--gold); background: #fff; }
  .entry .del { margin-top: 5px; }
  .e-addrow { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .e-addrow input, .e-addrow textarea {
    width: 100%; padding: 9px 12px; border-radius: 6px; border: 1px solid var(--line2);
    font-size: 13.5px; font-family: inherit; background: #fff; color: var(--navy); outline: none;
  }
  .e-addrow input:focus, .e-addrow textarea:focus { border-color: var(--gold); }
  .e-addrow button {
    align-self: flex-start; padding: 9px 18px; border-radius: 6px; border: none;
    background: var(--gold); color: #fff; font-weight: 700; font-size: 13px; cursor: pointer;
  }
  #installbar {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--navy); color: #fff; padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    text-align: center; font-size: 13.5px; z-index: 50;
  }
  #installbar button {
    margin-left: 10px; padding: 6px 14px; border-radius: 6px; border: none;
    background: var(--gold); color: #fff; font-weight: 700; cursor: pointer; font-size: 13px;
  }
  @media (max-width: 480px) {
    .stats { gap: 18px; }
    .counter .big { font-size: 27px; }
    .who { padding: 4px 9px; }
  }
</style>
</head>
<body>
<div class="mast"><div class="wrap">
  <div class="eyebrow">Dunsfold Residences · 3C Dunsfold Drive</div>
  <h1>Renovation &amp; Move</h1>
  <div class="stats">
    <div class="counter"><div class="big" id="dkeys">–</div><div class="lbl" id="dkeysLbl">days to keys</div></div>
    <div class="counter gold"><div class="big" id="dmove">–</div><div class="lbl" id="dmoveLbl">tentative move</div></div>
    <button class="editdates" id="editDatesBtn" title="Edit key collection and move dates">&#9998; edit dates</button>
    <div class="progwrap">
      <div class="progmeta"><span id="pmeta">0 of 0 done</span><span id="ppct">0%</span></div>
      <div class="progbar"><div id="pfill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="dateeditor" id="dateEditor">
    <label>Keys collection <input type="date" id="inKeys" /></label>
    <label>Move-in (tentative) <input type="date" id="inMove" /></label>
    <button id="dateDone">Done</button>
  </div>
</div></div>

<div class="toolbar" id="toolbar">
  <button class="chip on" data-f="All">All tasks</button>
  <button class="chip" data-f="CK">CK's tasks</button>
  <button class="chip" data-f="Sophia">Sophia's tasks</button>
  <button class="toolbtn" id="exportBtn" title="Download list as a file to share">Export</button>
  <button class="toolbtn" id="importBtn" title="Load a list file from your partner">Import</button>
  <input type="file" id="importFile" accept=".json,application/json" style="display:none" />
  <span class="savenote" id="savenote"></span>
</div>

<main id="app"></main>

<div id="installbar">
  Install this app on your phone for quick access
  <button id="installBtn">Install</button>
  <button id="installDismiss" style="background:transparent;border:1px solid #C7CEDB;">Not now</button>
</div>

<script>
// ── Seed data ────────────────────────────────────────────────────────
const SEED = {
  version: 4,
  dates: { keys: "2026-10-08", move: "2026-11-19" },
  phases: [
    { id:"p0", name:"Before Keys", dates:"Now – 7 Oct 2026", tasks:[
      { id:"p0-1", text:"Verify MCST 3729 maintenance fee + sinking fund balance", who:"CK", done:false },
      { id:"p0-2", text:"Ask MCST: approval rules for zip screens, landscaping, facade works", who:"CK", done:false },
      { id:"p0-3", text:"Get 2–3 quotes from ID / main contractors, shortlist", who:"Both", done:false },
      { id:"p0-4", text:"Engage M&E consultant for basement ERV design", who:"CK", done:false },
      { id:"p0-5", text:"Shortlist landscaper — west-sun shading: trees + vertical greenery", who:"Sophia", done:false },
      { id:"p0-6", text:"Choose Japanese toilet models for 5 bathrooms (check rough-in + power needs)", who:"Sophia", done:false },
      { id:"p0-7", text:"Confirm renovation budget envelope + payment schedule", who:"Both", done:false },
      { id:"p0-8", text:"Book movers for mid-Nov", who:"Both", done:false },
      { id:"p0-9", text:"Spec aircon upgrade for 3 west-facing rooms", who:"CK", done:false }
    ]},
    { id:"p1", name:"Keys + Assessment", dates:"8 – 21 Oct 2026", tasks:[
      { id:"p1-1", text:"Collect keys 8 Oct — photo/video document unit condition", who:"Both", done:false },
      { id:"p1-2", text:"Waterproofing inspection of both basements (BEFORE any ERV work)", who:"CK", done:false },
      { id:"p1-3", text:"M&E site survey: ERV sizing, duct routing, fresh-air intake location", who:"CK", done:false },
      { id:"p1-4", text:"Electrician survey: outlets near all 5 toilets + aircon circuits", who:"CK", done:false },
      { id:"p1-5", text:"Water pressure test for washlet requirements", who:"CK", done:false },
      { id:"p1-6", text:"Finalise contractor quote, award and sign", who:"Both", done:false },
      { id:"p1-7", text:"Submit MCST applications (screens / landscaping if required)", who:"CK", done:false },
      { id:"p1-8", text:"Order long-lead items: toilets, zip screens, ERV units, aircon", who:"Sophia", done:false },
      { id:"p1-9", text:"Landscaper site visit — mark tree positions clear of basement structure", who:"Sophia", done:false }
    ]},
    { id:"p2", name:"Core Works", dates:"22 Oct – 12 Nov 2026", tasks:[
      { id:"p2-1", text:"Waterproofing remediation (if inspection found issues)", who:"CK", done:false },
      { id:"p2-2", text:"ERV install: ceiling supply, low exhaust, CO2/humidity sensors, positive pressure", who:"CK", done:false },
      { id:"p2-3", text:"Electrical works: toilet outlets + aircon points", who:"CK", done:false },
      { id:"p2-4", text:"Install 5 Japanese toilet systems", who:"Sophia", done:false },
      { id:"p2-5", text:"Aircon upgrade in 3 west-facing rooms", who:"CK", done:false },
      { id:"p2-6", text:"Solar film on west-facing glass", who:"CK", done:false },
      { id:"p2-7", text:"Landscaping planting begins (trees need lead time — OK to continue post-move)", who:"Sophia", done:false },
      { id:"p2-8", text:"Zip screens install (subject to MCST approval — may slip past move-in)", who:"CK", done:false }
    ]},
    { id:"p3", name:"Move Prep + Move", dates:"13 – 19 Nov 2026", tasks:[
      { id:"p3-1", text:"Renovation walkthrough — build defects list with contractor", who:"Both", done:false },
      { id:"p3-2", text:"Post-reno deep cleaning", who:"Sophia", done:false },
      { id:"p3-3", text:"Utilities: SP account activation + internet installation", who:"CK", done:false },
      { id:"p3-4", text:"Address changes: banks, SingPass, IRAS, employers, subscriptions", who:"Both", done:false },
      { id:"p3-5", text:"Confirm mover date + pack", who:"Both", done:false },
      { id:"p3-6", text:"Move day — unpack essentials", who:"Both", done:false }
    ]},
    { id:"p4", name:"Post-Move", dates:"From 20 Nov 2026", tasks:[
      { id:"p4-1", text:"Monitor basement humidity (target under 60–65% RH)", who:"CK", done:false },
      { id:"p4-2", text:"Tree establishment watering schedule", who:"Sophia", done:false },
      { id:"p4-3", text:"Complete zip screens if delayed by MCST approval", who:"CK", done:false },
      { id:"p4-4", text:"Fix defects list items with contractor", who:"Both", done:false }
    ]}
  ]
};

const KEY = "dunsfold-reno-todo-v1";
const DEFAULT_DATES = { keys: "2026-10-08", move: "2026-11-19" };
function keysDate() { return new Date(state.dates.keys + "T00:00:00+08:00"); }
function moveDate() { return new Date(state.dates.move + "T00:00:00+08:00"); }
function fmtD(iso) {
  return new Date(iso + "T00:00:00+08:00")
    .toLocaleDateString("en-SG", { day: "numeric", month: "short", timeZone: "Asia/Singapore" });
}
// Phase windows derived from the editable keys/move dates, so labels and
// overdue checks stay correct whenever the dates are edited.
function addDays(base, days) { const x = new Date(base); x.setDate(x.getDate() + days); return x; }
function phaseWindow(pid) {
  const K = keysDate(), M = moveDate();
  switch (pid) {
    case "p0": return { start: null,          end: addDays(K, -1) };
    case "p1": return { start: K,             end: addDays(K, 13) };
    case "p2": return { start: addDays(K,14), end: addDays(M, -7) };
    case "p3": return { start: addDays(M,-6), end: M };
    case "p4": return { start: addDays(M, 1), end: null };
    default:   return null;
  }
}
function fmtPart(dt, opts) {
  return dt.toLocaleDateString("en-SG", { ...opts, timeZone: "Asia/Singapore" });
}
function phaseLabel(pid, fallback) {
  const w = phaseWindow(pid);
  if (!w) return fallback;
  if (!w.start) return "Now – " + fmtPart(w.end, { day:"numeric", month:"short", year:"numeric" });
  if (!w.end)   return "From " + fmtPart(w.start, { day:"numeric", month:"short", year:"numeric" });
  const sameMonth = fmtPart(w.start, { month:"short" }) === fmtPart(w.end, { month:"short" });
  const s = sameMonth ? fmtPart(w.start, { day:"numeric" })
                      : fmtPart(w.start, { day:"numeric", month:"short" });
  return s + " – " + fmtPart(w.end, { day:"numeric", month:"short", year:"numeric" });
}
function isOverdue(pid, t) {
  if (t.done || t.na) return false;
  const w = phaseWindow(pid);
  if (!w || !w.end) return false;
  return Date.now() > w.end.getTime() + 86399999; // past end of the phase's last day (SGT)
}
const CYCLE = { CK:"Sophia", Sophia:"Both", Both:"CK" };

let state, filter = "All";

function migrate(s) {
  if (!s.dates || !s.dates.keys || !s.dates.move) s.dates = { ...DEFAULT_DATES };
  const PHASE_DATES = {
    "Now – 13 Oct 2026": "Now – 7 Oct 2026",
    "14 – 27 Oct 2026": "8 – 21 Oct 2026",
    "28 Oct – 17 Nov 2026": "22 Oct – 12 Nov 2026",
    "18 – 30 Nov 2026": "13 – 19 Nov 2026",
    "Dec 2026 onward": "From 20 Nov 2026"
  };
  const TASK_TEXTS = {
    "Collect keys 14 Oct — photo/video document unit condition":
      "Collect keys 8 Oct — photo/video document unit condition",
    "Book movers for late Nov": "Book movers for mid-Nov"
  };
  s.phases.forEach(p => {
    if (PHASE_DATES[p.dates]) p.dates = PHASE_DATES[p.dates];
    p.tasks.forEach(t => {
      if (typeof t.notes !== "string") t.notes = "";
      if (!Array.isArray(t.items)) t.items = [];
      if (typeof t.na !== "boolean") t.na = false;
      if (TASK_TEXTS[t.text]) t.text = TASK_TEXTS[t.text];
    });
  });
  s.version = 4;
  return s;
}
function load() {
  try {
    const raw = localStorage.getItem(KEY);
    state = raw ? migrate(JSON.parse(raw)) : migrate(structuredClone(SEED));
  } catch { state = migrate(structuredClone(SEED)); }
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); flashSave("Saved ✓"); }
  catch { flashSave("Couldn't save", true); }
}
let saveTimer;
function flashSave(msg, err) {
  const el = document.getElementById("savenote");
  el.textContent = msg;
  el.style.color = err ? "var(--red)" : "var(--muted)";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => el.textContent = "", 1600);
}
let debTimer;
function saveDebounced() { clearTimeout(debTimer); debTimer = setTimeout(save, 600); }

function findTask(pid, tid) {
  const p = state.phases.find(x => x.id === pid);
  return p ? { p, t: p.tasks.find(x => x.id === tid) } : { p: null, t: null };
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── Routing ──────────────────────────────────────────────────────────
function route() {
  const m = location.hash.match(/^#t\/([^/]+)\/(.+)$/);
  return m ? { pid: m[1], tid: m[2] } : null;
}
window.addEventListener("hashchange", render);

// ── Render ───────────────────────────────────────────────────────────
function renderHeader() {
  const now = new Date();
  document.getElementById("dkeys").textContent = Math.max(0, Math.ceil((keysDate() - now)/864e5));
  document.getElementById("dmove").textContent = Math.max(0, Math.ceil((moveDate() - now)/864e5));
  document.getElementById("dkeysLbl").textContent = "days to keys · " + fmtD(state.dates.keys);
  document.getElementById("dmoveLbl").textContent = "tentative move · " + fmtD(state.dates.move);
  const all = state.phases.flatMap(p => p.tasks);
  const na = all.filter(t => t.na).length;
  const need = all.length - na;
  const done = all.filter(t => t.done && !t.na).length;
  const pct = need ? Math.round(done/need*100) : 0;
  document.getElementById("pmeta").textContent =
    done + " of " + need + " done" + (na ? " · " + na + " n/a" : "");
  document.getElementById("ppct").textContent = pct + "%";
  document.getElementById("pfill").style.width = pct + "%";
}

function render() {
  renderHeader();
  const r = route();
  document.getElementById("toolbar").style.display = r ? "none" : "flex";
  if (r) renderDetail(r.pid, r.tid);
  else renderList();
}

function renderList() {
  const root = document.getElementById("app");
  root.innerHTML = "";
  state.phases.forEach((phase, pi) => {
    const pna = phase.tasks.filter(t => t.na).length;
    const pneed = phase.tasks.length - pna;
    const pd = phase.tasks.filter(t => t.done && !t.na).length;
    const vis = phase.tasks.filter(t => filter === "All" || t.who === filter || t.who === "Both");
    const sec = document.createElement("section");
    sec.innerHTML = `
      <div class="phead">
        <span class="pnum">${String(pi).padStart(2,"0")}</span>
        <h2>${esc(phase.name)}</h2>
        <span class="pdates">${esc(phaseLabel(phase.id, phase.dates))}</span>
        <span class="pcount ${pd === pneed && pneed > 0 ? "full":""}">${pd}/${pneed}${pna ? " · " + pna + " n/a" : ""}</span>
      </div>
      <ul class="tasks">
        ${vis.map(t => {
          const bits = [];
          if (t.na) bits.push("not necessary");
          if (t.items.length) bits.push(t.items.length + (t.items.length === 1 ? " entry" : " entries"));
          if (t.notes.trim()) bits.push("notes");
          const idx = phase.tasks.indexOf(t);
          const cbTxt = t.na ? "–" : (t.done ? "✓" : "");
          const late = isOverdue(phase.id, t);
          return `
          <li class="task ${t.done && !t.na ? "done":""} ${t.na ? "na":""} ${late ? "late":""}" data-p="${phase.id}" data-t="${t.id}">
            <span class="pri">${idx + 1}</span>
            ${filter === "All" ? `
            <div class="mv">
              <button class="up" ${idx === 0 ? "disabled":""} title="Move up" aria-label="Move up">▲</button>
              <button class="dn" ${idx === phase.tasks.length - 1 ? "disabled":""} title="Move down" aria-label="Move down">▼</button>
            </div>` : ""}
            <button class="cb" aria-label="Toggle status">${cbTxt}</button>
            <div class="txtwrap" title="Open details">
              <div class="txt">${esc(t.text)}</div>
              ${bits.length ? `<div class="meta">${bits.join(" · ")} ›</div>` : `<div class="meta" style="color:var(--muted);font-weight:400">tap to add details ›</div>`}
            </div>
            <button class="who ${t.who}" title="Click to reassign">${t.who}</button>
            <button class="del" aria-label="Delete task" title="Delete">×</button>
          </li>`;
        }).join("")}
        ${vis.length === 0 ? `<li class="empty">No tasks for this filter — switch to "All tasks" to see everything.</li>` : ""}
      </ul>
      <div class="addrow">
        <input type="text" placeholder="Add a task to ${esc(phase.name)}…" data-add="${phase.id}" />
        <button data-addbtn="${phase.id}">Add</button>
      </div>`;
    root.appendChild(sec);
  });

  const foot = document.createElement("p");
  foot.className = "foot";
  foot.textContent = "Tap any task to open its detail page — edit the title, keep notes, and log entries (e.g. each contractor and their quote; star the one you pick). Data is stored on this device; use Export / Import to sync between CK and Sophia. Timeline note: waterproofing must be confirmed before ERV installation; trees and MCST-dependent screens may continue past move-in.";
  root.appendChild(foot);
}

function renderDetail(pid, tid) {
  const { p, t } = findTask(pid, tid);
  const root = document.getElementById("app");
  if (!t) {
    root.innerHTML = `<button class="back" onclick="location.hash=''">‹ All tasks</button>
      <p class="empty">This task no longer exists — it may have been deleted.</p>`;
    return;
  }
  root.innerHTML = `
    <button class="back" id="backBtn">‹ All tasks</button>
    <div class="d-eyebrow">${esc(p.name)} · ${esc(phaseLabel(p.id, p.dates))}</div>
    <input class="d-title" id="dTitle" value="${esc(t.text)}" aria-label="Task title (editable)" />
    <div class="d-status">
      <div class="seg" role="group" aria-label="Status">
        <button class="s-open ${!t.done && !t.na ? "on":""}" data-s="open">Open</button>
        <button class="s-done ${t.done && !t.na ? "on":""}" data-s="done">Done</button>
        <button class="s-na ${t.na ? "on":""}" data-s="na">Not necessary</button>
      </div>
      <button class="who ${t.who}" id="dWho" title="Click to reassign">${t.who}</button>
    </div>

    <div class="d-sec">
      <h3>Notes</h3>
      <textarea class="d-notes" id="dNotes" placeholder="Anything worth remembering — decisions, phone numbers, measurements…">${esc(t.notes)}</textarea>
    </div>

    <div class="d-sec">
      <h3>Entries</h3>
      <p class="hint">One row per option or update — e.g. each contractor and their quote. Tap ★ to mark your pick.</p>
      <div id="entries">
        ${t.items.map(it => `
          <div class="entry" data-i="${it.id}">
            <button class="pick ${it.pick ? "on":""}" title="Mark as chosen">★</button>
            <div class="fields">
              <input value="${esc(it.text)}" data-f="text" placeholder="Name (e.g. ABC Contractors)" />
              <textarea data-f="detail" rows="1" placeholder="Details (e.g. S$120,000 — includes ERV, 6-week schedule)">${esc(it.detail || "")}</textarea>
            </div>
            <button class="del" title="Delete entry">×</button>
          </div>`).join("")}
        ${t.items.length === 0 ? `<p class="empty">No entries yet.</p>` : ""}
      </div>
      <div class="e-addrow">
        <input id="eName" placeholder="Name (e.g. ABC Contractors)" />
        <textarea id="eDetail" rows="2" placeholder="Details (e.g. S$120,000 — includes ERV, excludes landscaping, 6 weeks)"></textarea>
        <button id="eAdd">Add entry</button>
      </div>
    </div>`;

  document.getElementById("backBtn").onclick = () => { location.hash = ""; };
  document.getElementById("dTitle").addEventListener("input", e => { t.text = e.target.value; saveDebounced(); });
  document.getElementById("dNotes").addEventListener("input", e => { t.notes = e.target.value; saveDebounced(); });
  document.querySelectorAll(".seg button").forEach(b => b.onclick = () => {
    const s = b.dataset.s;
    t.done = (s === "done");
    t.na = (s === "na");
    save(); render();
  });
  document.getElementById("dWho").onclick = () => { t.who = CYCLE[t.who]; save(); render(); };
  document.getElementById("eAdd").onclick = () => {
    const name = document.getElementById("eName").value.trim();
    const detail = document.getElementById("eDetail").value.trim();
    if (!name && !detail) return;
    t.items.push({ id: "e" + Date.now(), text: name, detail, pick: false });
    save(); render();
  };
  const entries = document.getElementById("entries");
  entries.addEventListener("input", e => {
    const row = e.target.closest(".entry"); if (!row) return;
    const it = t.items.find(x => x.id === row.dataset.i); if (!it) return;
    if (e.target.dataset.f === "text") it.text = e.target.value;
    if (e.target.dataset.f === "detail") it.detail = e.target.value;
    saveDebounced();
  });
  entries.addEventListener("click", e => {
    const row = e.target.closest(".entry"); if (!row) return;
    const it = t.items.find(x => x.id === row.dataset.i); if (!it) return;
    if (e.target.classList.contains("pick")) { it.pick = !it.pick; save(); render(); }
    if (e.target.classList.contains("del")) {
      t.items = t.items.filter(x => x !== it); save(); render();
    }
  });
}

// ── List events (delegated) ──────────────────────────────────────────
document.getElementById("app").addEventListener("click", e => {
  if (route()) return; // detail view handles its own events
  const li = e.target.closest("li.task");
  if (li) {
    const { p, t } = findTask(li.dataset.p, li.dataset.t);
    if (!t) return;
    if (e.target.classList.contains("cb")) {
      if (t.na) { t.na = false; }
      else { t.done = !t.done; }
      save(); render(); return;
    }
    if (e.target.closest(".mv")) {
      const dir = e.target.classList.contains("up") ? -1 : 1;
      const i = p.tasks.indexOf(t), j = i + dir;
      if (j >= 0 && j < p.tasks.length) {
        [p.tasks[i], p.tasks[j]] = [p.tasks[j], p.tasks[i]];
        save(); render();
      }
      return;
    }
    if (e.target.classList.contains("who")) { t.who = CYCLE[t.who]; save(); render(); return; }
    if (e.target.classList.contains("del")) { p.tasks = p.tasks.filter(x => x !== t); save(); render(); return; }
    if (e.target.closest(".txtwrap")) { location.hash = "t/" + p.id + "/" + t.id; return; }
  }
  if (e.target.dataset.addbtn) addTask(e.target.dataset.addbtn);
});
document.getElementById("app").addEventListener("keydown", e => {
  if (e.key === "Enter" && e.target.dataset && e.target.dataset.add) addTask(e.target.dataset.add);
});
function addTask(pid) {
  const input = document.querySelector(`input[data-add="${pid}"]`);
  const text = input.value.trim();
  if (!text) return;
  const p = state.phases.find(x => x.id === pid);
  p.tasks.push({ id: pid + "-" + Date.now(), text, who: "Both", done: false, na: false, notes: "", items: [] });
  save(); render();
  const again = document.querySelector(`input[data-add="${pid}"]`);
  if (again) again.focus();
}

// filters
document.querySelectorAll(".chip").forEach(c => c.addEventListener("click", () => {
  filter = c.dataset.f;
  document.querySelectorAll(".chip").forEach(x => x.classList.toggle("on", x === c));
  render();
}));

// export / import
document.getElementById("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "dunsfold-reno-" + new Date().toISOString().slice(0,10) + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
});
document.getElementById("importBtn").addEventListener("click", () =>
  document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", e => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const parsed = JSON.parse(r.result);
      if (!parsed.phases) throw new Error("bad file");
      state = migrate(parsed); save(); render(); flashSave("Imported ✓");
    } catch { flashSave("That file isn't a valid list", true); }
  };
  r.readAsText(f);
  e.target.value = "";
});

// ── Date editor ──────────────────────────────────────────────────────
document.getElementById("editDatesBtn").addEventListener("click", () => {
  const ed = document.getElementById("dateEditor");
  const open = ed.style.display === "flex";
  if (!open) {
    document.getElementById("inKeys").value = state.dates.keys;
    document.getElementById("inMove").value = state.dates.move;
  }
  ed.style.display = open ? "none" : "flex";
});
document.getElementById("dateDone").addEventListener("click", () => {
  const k = document.getElementById("inKeys").value;
  const m = document.getElementById("inMove").value;
  if (k) state.dates.keys = k;
  if (m) state.dates.move = m;
  document.getElementById("dateEditor").style.display = "none";
  save(); render();
});

// ── PWA install prompt ───────────────────────────────────────────────
let deferredPrompt;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installbar").style.display = "block";
});
document.getElementById("installBtn").addEventListener("click", async () => {
  document.getElementById("installbar").style.display = "none";
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
});
document.getElementById("installDismiss").addEventListener("click", () =>
  document.getElementById("installbar").style.display = "none");

// service worker
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () =>
    navigator.serviceWorker.register("sw.js").catch(() => {}));
}

// go
load(); render();
setInterval(renderHeader, 60 * 60 * 1000);
</script>
</body>
</html>
